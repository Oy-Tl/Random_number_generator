<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>随机数生成器</title>
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 50%, #dfe3e8 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #000;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Fade-in animation ── */
  .fade-in {
    opacity: 0;
    animation: fadeIn 0.5s ease-out forwards;
  }
  .fade-in:nth-child(1) { animation-delay: 0.05s; }
  .fade-in:nth-child(2) { animation-delay: 0.10s; }
  .fade-in:nth-child(3) { animation-delay: 0.15s; }
  .fade-in:nth-child(4) { animation-delay: 0.20s; }
  .fade-in:nth-child(5) { animation-delay: 0.25s; }
  .fade-in:nth-child(6) { animation-delay: 0.30s; }
  .fade-in:nth-child(7) { animation-delay: 0.35s; }
  .fade-in:nth-child(8) { animation-delay: 0.40s; }
  .fade-in:nth-child(9) { animation-delay: 0.45s; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Result area (top half) ── */
  .result-section {
    width: 100%;
    height: 50vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
  }

  .result-container {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 1.2rem 2rem;
    max-width: 90vw;
  }

  .result-number {
    font-size: clamp(3rem, 8vw, 8rem);
    font-weight: 900;
    color: #000;
    line-height: 1;
    transition: transform 0.1s ease;
  }

  .result-number.pop {
    animation: popIn 0.15s ease-out;
  }

  @keyframes popIn {
    0%   { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  /* ── Separator ── */
  .divider {
    width: 60%;
    max-width: 600px;
    height: 1px;
    background: linear-gradient(to right, transparent, #ccc, transparent);
  }

  /* ── Settings section ── */
  .settings-section {
    width: 100%;
    max-width: 680px;
    padding: 0 1.5rem 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .settings-card {
    background: #fff;
    border-radius: 16px;
    padding: 1.8rem 2rem;
    box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
    display: flex;
    flex-direction: column;
    gap: 1.4rem;
  }

  .setting-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .setting-label {
    font-size: 0.95rem;
    font-weight: 600;
    color: #333;
    min-width: 100px;
  }

  .input-group {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .input-group input {
    width: 100px;
    padding: 0.6rem 0.8rem;
    border: 1.5px solid #ddd;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    color: #000;
    text-align: center;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    font-family: inherit;
  }

  .input-group input:focus {
    border-color: #5b9bd5;
    box-shadow: 0 0 0 3px rgba(91, 155, 213, 0.15);
  }

  .input-group input.invalid {
    border-color: #e74c3c;
    box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.12);
  }

  .input-separator {
    color: #999;
    font-weight: 600;
    font-size: 1rem;
  }

  .range-hint {
    font-size: 0.78rem;
    color: #999;
    margin-left: 0.3rem;
  }

  /* ── Buttons ── */
  .button-row {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  button {
    padding: 0.75rem 2rem;
    border: none;
    border-radius: 12px;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.02em;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
    position: relative;
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
  }

  button:active {
    transform: translateY(0);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  }

  .btn-generate {
    background: #3b82f6;
    color: #fff;
  }
  .btn-generate:hover {
    background: #2563eb;
  }

  .btn-start {
    background: #22c55e;
    color: #fff;
  }
  .btn-start:hover {
    background: #16a34a;
  }

  .btn-stop {
    background: #ef4444;
    color: #fff;
    animation: pulseStop 1.5s ease-in-out infinite;
  }
  .btn-stop:hover {
    background: #dc2626;
  }

  @keyframes pulseStop {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
    50%      { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); }
  }

  .hidden {
    display: none !important;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .result-number {
      font-size: clamp(2rem, 10vw, 5rem);
    }
    .settings-card {
      padding: 1.2rem 1rem;
    }
    .setting-row {
      flex-direction: column;
      align-items: flex-start;
    }
    button {
      flex: 1;
      min-width: 120px;
    }
  }
</style>
</head>
<body>

  <div class="result-section fade-in">
    <div class="result-container" id="resultContainer">
    </div>
  </div>

  <div class="divider fade-in"></div>

  <div class="settings-section fade-in">
    <div class="settings-card">

      <div class="setting-row fade-in">
        <span class="setting-label">最小值</span>
        <div class="input-group">
          <input type="number" id="minInput" value="1" min="-99999" max="99999" step="1">
        </div>
        <span class="range-hint">范围：-99999 ~ 99999</span>
      </div>

      <div class="setting-row fade-in">
        <span class="setting-label">最大值</span>
        <div class="input-group">
          <input type="number" id="maxInput" value="65" min="-99999" max="99999" step="1">
        </div>
        <span class="range-hint">范围：-99999 ~ 99999</span>
      </div>

      <div class="setting-row fade-in">
        <span class="setting-label">生成个数</span>
        <div class="input-group">
          <input type="number" id="countInput" value="1" min="1" max="50" step="1">
        </div>
        <span class="range-hint">范围：1 ~ 50</span>
      </div>

    </div>

    <div class="button-row fade-in">
      <button class="btn-generate" id="btnGenerate" onclick="generateOnce()">直接生成</button>
      <button class="btn-start"   id="btnStart"   onclick="startGenerating()">开始生成</button>
      <button class="btn-stop hidden" id="btnStop" onclick="stopGenerating()">停止</button>
    </div>
  </div>

<script>
  const resultContainer = document.getElementById('resultContainer');
  const minInput  = document.getElementById('minInput');
  const maxInput  = document.getElementById('maxInput');
  const countInput = document.getElementById('countInput');
  const btnGenerate = document.getElementById('btnGenerate');
  const btnStart    = document.getElementById('btnStart');
  const btnStop     = document.getElementById('btnStop');

  let timer = null;
  const FPS = 30;
  const INTERVAL_MS = Math.round(1000 / FPS); // ~33ms

  // ── Validation & clamping ──
  function clampInputs() {
    let min = parseInt(minInput.value, 10);
    let max = parseInt(maxInput.value, 10);
    let count = parseInt(countInput.value, 10);

    if (isNaN(min)) min = 1;
    if (isNaN(max)) max = 65;
    if (isNaN(count)) count = 1;

    min = Math.max(-99999, Math.min(99999, min));
    max = Math.max(-99999, Math.min(99999, max));
    count = Math.max(1, Math.min(50, count));

    // Ensure min <= max
    if (min > max) {
      const tmp = min;
      min = max;
      max = tmp;
    }

    minInput.value = min;
    maxInput.value = max;
    countInput.value = count;

    return { min, max, count };
  }

  function validateInput(inputEl, lo, hi) {
    const val = parseInt(inputEl.value, 10);
    if (isNaN(val) || val < lo || val > hi) {
      inputEl.classList.add('invalid');
    } else {
      inputEl.classList.remove('invalid');
    }
  }

  minInput.addEventListener('input', () => { validateInput(minInput, -99999, 99999); });
  maxInput.addEventListener('input', () => { validateInput(maxInput, -99999, 99999); });
  countInput.addEventListener('input', () => { validateInput(countInput, 1, 50); });

  // ── Generate random integer ──
  function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  // ── Render numbers to DOM ──
  function renderNumbers(numbers) {
    // Rebuild child elements if count changed
    const currentSpans = resultContainer.querySelectorAll('.result-number');
    if (currentSpans.length !== numbers.length) {
      resultContainer.innerHTML = '';
      numbers.forEach((n, i) => {
        const span = document.createElement('span');
        span.className = 'result-number';
        span.id = 'num' + i;
        span.textContent = n;
        resultContainer.appendChild(span);
      });
    } else {
      numbers.forEach((n, i) => {
        const span = currentSpans[i];
        if (span.textContent !== String(n)) {
          span.textContent = n;
          // Quick pop animation
          span.classList.remove('pop');
          void span.offsetWidth; // force reflow
          span.classList.add('pop');
        }
      });
    }
  }

  // ── Generate and display ──
  function generateAndDisplay() {
    const { min, max, count } = clampInputs();
    const numbers = [];
    for (let i = 0; i < count; i++) {
      numbers.push(randomInt(min, max));
    }
    renderNumbers(numbers);
    return numbers;
  }

  // ── Generate once ──
  function generateOnce() {
    stopGenerating();
    clampInputs();
    generateAndDisplay();
  }

  // ── Start continuous generation ──
  function startGenerating() {
    clampInputs();
    btnStart.classList.add('hidden');
    btnStop.classList.remove('hidden');
    generateAndDisplay();
    timer = setInterval(generateAndDisplay, INTERVAL_MS);
  }

  // ── Stop ──
  function stopGenerating() {
    if (timer) {
      clearInterval(timer);
      timer = null;
    }
    btnStop.classList.add('hidden');
    btnStart.classList.remove('hidden');
  }

  // ── Initialize on load ── (display blank until user clicks generate)
</script>

</body>
</html>
