<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>随机数生成器</title>
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 50%, #dfe3e8 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #000;
    -webkit-font-smoothing: antialiased;
    position: relative;
    overflow-x: hidden;
  }

  /* ── Background motto group ── */
  .motto-group {
    position: fixed;
    z-index: 0;
    pointer-events: none;
    user-select: none;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.25rem;
    transition: opacity 0.4s ease;
  }
  .motto-group.hide-motto {
    opacity: 0;
  }

  .motto-line {
    font-weight: 600;
    color: rgba(0, 0, 0, 0.15);
    white-space: nowrap;
    font-size: clamp(1rem, 2.4vw, 1.8rem);
    letter-spacing: 0.04em;
    line-height: 1.3;
  }

  /* Ensure main content stays above motto */
  .result-section,
  .divider,
  .settings-section {
    position: relative;
    z-index: 1;
  }

  /* ── Fade-in animation ── */
  .fade-in {
    opacity: 0;
    animation: fadeIn 0.5s ease-out forwards;
  }
  .fade-in:nth-child(1) { animation-delay: 0.05s; }
  .fade-in:nth-child(2) { animation-delay: 0.10s; }
  .fade-in:nth-child(3) { animation-delay: 0.15s; }
  .fade-in:nth-child(4) { animation-delay: 0.20s; }
  .fade-in:nth-child(5) { animation-delay: 0.25s; }
  .fade-in:nth-child(6) { animation-delay: 0.30s; }
  .fade-in:nth-child(7) { animation-delay: 0.35s; }
  .fade-in:nth-child(8) { animation-delay: 0.40s; }
  .fade-in:nth-child(9) { animation-delay: 0.45s; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Result area (top half) ── */
  .result-section {
    width: 100%;
    height: 50vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
  }

  .result-container {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 1.2rem 2rem;
    max-width: 90vw;
  }

  .result-number {
    font-size: clamp(3rem, 8vw, 8rem);
    font-weight: 900;
    color: #000;
    line-height: 1;
    transition: transform 0.1s ease;
  }

  .result-number.pop {
    animation: popIn 0.15s ease-out;
  }

  @keyframes popIn {
    0%   { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  /* ── Separator ── */
  .divider {
    width: 60%;
    max-width: 600px;
    height: 1px;
    background: linear-gradient(to right, transparent, #ccc, transparent);
  }

  /* ── Settings section ── */
  .settings-section {
    width: 100%;
    max-width: 680px;
    padding: 0 1.5rem 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .settings-card {
    background: rgba(255,255,255,0.88);
    border-radius: 16px;
    padding: 1.8rem 2rem;
    box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
    display: flex;
    flex-direction: column;
    gap: 1.4rem;
  }

  .setting-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .setting-label {
    font-size: 0.95rem;
    font-weight: 600;
    color: #333;
    min-width: 100px;
  }

  .input-group {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .input-group input {
    width: 100px;
    padding: 0.6rem 0.8rem;
    border: 1.5px solid #ddd;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    color: #000;
    text-align: center;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    font-family: inherit;
  }

  .input-group input:focus {
    border-color: #5b9bd5;
    box-shadow: 0 0 0 3px rgba(91, 155, 213, 0.15);
  }

  .input-group input.invalid {
    border-color: #e74c3c;
    box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.12);
  }

  .input-separator {
    color: #999;
    font-weight: 600;
    font-size: 1rem;
  }

  .range-hint {
    font-size: 0.78rem;
    color: #999;
    margin-left: 0.3rem;
  }

  /* ── Buttons ── */
  .button-row {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  button {
    padding: 0.75rem 2rem;
    border: none;
    border-radius: 12px;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.02em;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
    position: relative;
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
  }

  button:active {
    transform: translateY(0);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  }

  .btn-generate {
    background: rgba(59,130,246,0.88);
    color: #fff;
  }
  .btn-generate:hover {
    background: rgba(37,99,235,0.88);
  }

  .btn-start {
    background: rgba(34,197,94,0.88);
    color: #fff;
  }
  .btn-start:hover {
    background: rgba(22,163,74,0.88);
  }

  .btn-stop {
    background: rgba(239,68,68,0.88);
    color: #fff;
    animation: pulseStop 1.5s ease-in-out infinite;
  }
  .btn-stop:hover {
    background: rgba(220,38,38,0.88);
  }

  @keyframes pulseStop {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
    50%      { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); }
  }

  .hidden {
    display: none !important;
  }

  /* ── Motto toggle ── */
  .motto-toggle-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    margin-top: 0.3rem;
  }

  .motto-toggle-label {
    font-size: 0.85rem;
    color: #888;
    cursor: pointer;
    user-select: none;
    transition: color 0.2s;
  }
  .motto-toggle-label:hover {
    color: #555;
  }

  /* Custom toggle switch */
  .toggle-switch {
    position: relative;
    width: 44px;
    height: 24px;
    flex-shrink: 0;
  }
  .toggle-switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }
  .toggle-slider {
    position: absolute;
    inset: 0;
    background: #ccc;
    border-radius: 24px;
    cursor: pointer;
    transition: background 0.3s;
  }
  .toggle-slider::before {
    content: "";
    position: absolute;
    width: 20px;
    height: 20px;
    left: 2px;
    bottom: 2px;
    background: rgba(255,255,255,0.88);
    border-radius: 50%;
    transition: transform 0.3s;
  }
  .toggle-switch input:checked + .toggle-slider {
    background: rgba(59,130,246,0.88);
  }
  .toggle-switch input:checked + .toggle-slider::before {
    transform: translateX(20px);
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .result-number {
      font-size: clamp(2rem, 10vw, 5rem);
    }
    .settings-card {
      padding: 1.2rem 1rem;
    }
    .setting-row {
      flex-direction: column;
      align-items: flex-start;
    }
    button {
      flex: 1;
      min-width: 120px;
    }
  }
</style>
</head>
<body>

  <!-- Background motto lines -->
  <div class="motto-group" id="mottoGroup0">
    <span class="motto-line">抽到了就讲讲吧</span>
    <span class="motto-line">讲得不好也没关系，毕竟</span>
    <span class="motto-line">人非圣贤孰能无过</span>
  </div>
  <div class="motto-group" id="mottoGroup1">
    <span class="motto-line">考成这样都是惯的！</span>
  </div>
  <div class="motto-group" id="mottoGroup2">
    <span class="motto-line">孩子们你们自己看看像话不！</span>
  </div>
  <div class="motto-group" id="mottoGroup3">
    <span class="motto-line">自己把自己当驽马</span>
    <span class="motto-line">你也就能跑几十公里！</span>
  </div>
  <div class="motto-group" id="mottoGroup4">
    <span class="motto-line">你不学有的人是学</span>
    <span class="motto-line">一天差一点你想想一学期差多少</span>
    <span class="motto-line">落掉的就是那些不学的</span>
  </div>
  <div class="motto-group" id="mottoGroup5">
    <span class="motto-line">这都是高考题考的！~</span>
  </div>
  <div class="motto-group" id="mottoGroup6">
    <span class="motto-line">你不会人家都会</span>
    <span class="motto-line">你紧张不你焦虑不</span>
  </div>
  <div class="motto-group" id="mottoGroup7">
    <span class="motto-line">我不讲这个知识点不是不重要</span>
    <span class="motto-line">都在班里面讲过多少遍了</span>
  </div>

  <div class="result-section fade-in">
    <div class="result-container" id="resultContainer">
    </div>
  </div>

  <div class="divider fade-in"></div>

  <div class="settings-section fade-in">
    <div class="settings-card">

      <div class="setting-row fade-in">
        <span class="setting-label">最小值</span>
        <div class="input-group">
          <input type="number" id="minInput" value="1" min="-99999" max="99999" step="1">
        </div>
        <span class="range-hint">范围：-99999 ~ 99999</span>
      </div>

      <div class="setting-row fade-in">
        <span class="setting-label">最大值</span>
        <div class="input-group">
          <input type="number" id="maxInput" value="65" min="-99999" max="99999" step="1">
        </div>
        <span class="range-hint">范围：-99999 ~ 99999</span>
      </div>

      <div class="setting-row fade-in">
        <span class="setting-label">生成个数</span>
        <div class="input-group">
          <input type="number" id="countInput" value="1" min="1" max="50" step="1">
        </div>
        <span class="range-hint">范围：1 ~ 50</span>
      </div>

    </div>

    <div class="button-row fade-in">
      <button class="btn-generate" id="btnGenerate" onclick="generateOnce()">直接生成</button>
      <button class="btn-start"   id="btnStart"   onclick="startGenerating()">开始生成</button>
      <button class="btn-stop hidden" id="btnStop" onclick="stopGenerating()">停止</button>
    </div>

    <div class="motto-toggle-row fade-in">
      <label class="toggle-switch">
        <input type="checkbox" id="mottoToggle" checked>
        <span class="toggle-slider"></span>
      </label>
      <span class="motto-toggle-label" id="mottoToggleLabel">显示励志标语</span>
    </div>
  </div>

<script>
  const resultContainer = document.getElementById('resultContainer');
  const minInput  = document.getElementById('minInput');
  const maxInput  = document.getElementById('maxInput');
  const countInput = document.getElementById('countInput');
  const btnGenerate = document.getElementById('btnGenerate');
  const btnStart    = document.getElementById('btnStart');
  const btnStop     = document.getElementById('btnStop');

  let timer = null;
  const FPS = 30;
  const INTERVAL_MS = Math.round(1000 / FPS); // ~33ms

  // ── Validation & clamping ──
  function clampInputs() {
    let min = parseInt(minInput.value, 10);
    let max = parseInt(maxInput.value, 10);
    let count = parseInt(countInput.value, 10);

    if (isNaN(min)) min = 1;
    if (isNaN(max)) max = 65;
    if (isNaN(count)) count = 1;

    min = Math.max(-99999, Math.min(99999, min));
    max = Math.max(-99999, Math.min(99999, max));
    count = Math.max(1, Math.min(50, count));

    // Ensure min <= max
    if (min > max) {
      const tmp = min;
      min = max;
      max = tmp;
    }

    minInput.value = min;
    maxInput.value = max;
    countInput.value = count;

    return { min, max, count };
  }

  function validateInput(inputEl, lo, hi) {
    const val = parseInt(inputEl.value, 10);
    if (isNaN(val) || val < lo || val > hi) {
      inputEl.classList.add('invalid');
    } else {
      inputEl.classList.remove('invalid');
    }
  }

  minInput.addEventListener('input', () => { validateInput(minInput, -99999, 99999); });
  maxInput.addEventListener('input', () => { validateInput(maxInput, -99999, 99999); });
  countInput.addEventListener('input', () => { validateInput(countInput, 1, 50); });

  // ── Generate random integer ──
  function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  // ── Render numbers to DOM ──
  function renderNumbers(numbers) {
    // Rebuild child elements if count changed
    const currentSpans = resultContainer.querySelectorAll('.result-number');
    if (currentSpans.length !== numbers.length) {
      resultContainer.innerHTML = '';
      numbers.forEach((n, i) => {
        const span = document.createElement('span');
        span.className = 'result-number';
        span.id = 'num' + i;
        span.textContent = n;
        resultContainer.appendChild(span);
      });
    } else {
      numbers.forEach((n, i) => {
        const span = currentSpans[i];
        if (span.textContent !== String(n)) {
          span.textContent = n;
          // Quick pop animation
          span.classList.remove('pop');
          void span.offsetWidth; // force reflow
          span.classList.add('pop');
        }
      });
    }
  }

  // ── Generate and display ──
  function generateAndDisplay() {
    const { min, max, count } = clampInputs();
    const numbers = [];
    for (let i = 0; i < count; i++) {
      numbers.push(randomInt(min, max));
    }
    renderNumbers(numbers);
    return numbers;
  }

  // ── Generate once ──
  function generateOnce() {
    stopGenerating();
    clampInputs();
    generateAndDisplay();
  }

  // ── Start continuous generation ──
  function startGenerating() {
    clampInputs();
    btnStart.classList.add('hidden');
    btnStop.classList.remove('hidden');
    generateAndDisplay();
    timer = setInterval(generateAndDisplay, INTERVAL_MS);
  }

  // ── Stop ──
  function stopGenerating() {
    if (timer) {
      clearInterval(timer);
      timer = null;
    }
    btnStop.classList.add('hidden');
    btnStart.classList.remove('hidden');
  }

  // ── Motto toggle ──
  const mottoToggle = document.getElementById('mottoToggle');
  const mottoToggleLabel = document.getElementById('mottoToggleLabel');
  const mottoGroups = [
    document.getElementById('mottoGroup0'),
    document.getElementById('mottoGroup1'),
    document.getElementById('mottoGroup2'),
    document.getElementById('mottoGroup3'),
    document.getElementById('mottoGroup4'),
    document.getElementById('mottoGroup5'),
    document.getElementById('mottoGroup6'),
    document.getElementById('mottoGroup7'),
  ];

  mottoToggle.addEventListener('change', () => {
    const show = mottoToggle.checked;
    mottoGroups.forEach(g => g.classList.toggle('hide-motto', !show));
  });

  // ── Randomly position all motto groups — no overlap, evenly spread ──
  function randomizeMottoPositions() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const padding = 20;
    const gap = 18; // minimum gap between groups

    // Measure all groups
    const sizes = mottoGroups.map(g => {
      const r = g.getBoundingClientRect();
      return { w: r.width, h: r.height };
    });

    // Safe vertical zones that avoid the centered white card (~50vh–85vh)
    const safeZones = [
      { tMin: padding,              tMax: vh * 0.44 },
      { tMin: vh * 0.86,            tMax: vh - padding },
    ];

    // Generate fine-grained candidate positions across both safe zones
    const candidates = [];
    const steps = 20;
    safeZones.forEach(zone => {
      for (let i = 0; i <= steps; i++) {
        const top = zone.tMin + (i / steps) * (zone.tMax - zone.tMin);
        candidates.push({ top, side: 'left' });
        candidates.push({ top, side: 'right' });
      }
    });

    // Shuffle so each reload gives a different layout
    const shuffled = candidates.slice().sort(() => Math.random() - 0.5);

    const placed = []; // { top, left, w, h }

    mottoGroups.forEach((group, i) => {
      const sw = sizes[i].w;
      const sh = sizes[i].h;
      let chosen = null;

      for (const c of shuffled) {
        const left = c.side === 'left' ? padding : vw - sw - padding;
        const top  = Math.max(padding, Math.min(vh - sh - padding, c.top));

        // Collision check against already-placed groups
        let overlap = false;
        for (const p of placed) {
          const horzGap = left + sw + gap <= p.left || p.left + p.w + gap <= left;
          const vertGap = top + sh + gap <= p.top  || p.top + p.h + gap <= top;
          if (!horzGap && !vertGap) { overlap = true; break; }
        }
        if (!overlap) {
          chosen = { top, left };
          placed.push({ top, left, w: sw, h: sh });
          break;
        }
      }

      // Fallback: pick a random safe position if no candidate worked
      if (!chosen) {
        const side = Math.random() < 0.5 ? 'left' : 'right';
        const zone = safeZones[Math.floor(Math.random() * safeZones.length)];
        const top  = zone.tMin + Math.random() * Math.max(0, zone.tMax - zone.tMin - sh);
        const left = side === 'left' ? padding : vw - sw - padding;
        chosen = { top, left };
        placed.push({ top, left, w: sw, h: sh });
      }

      group.style.top  = chosen.top + 'px';
      group.style.left = chosen.left + 'px';
      const rot = (Math.random() - 0.5) * 4;
      group.style.transform = 'rotate(' + rot + 'deg)';
    });
  }

  randomizeMottoPositions();
  window.addEventListener('resize', randomizeMottoPositions);

  // ── Initialize on load ── (display blank until user clicks generate)
</script>

</body>
</html>
